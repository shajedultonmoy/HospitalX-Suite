apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospitalx-backend
  labels:
    app: hospitalx-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospitalx-backend
  template:
    metadata:
      labels:
        app: hospitalx-backend
    spec:
      containers:
      - name: backend
        image: hospitalx-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: JWT_SECRET
          value: "hospitalx_super_secret_key"
        - name: NODE_ENV
          value: "development"
        - name: DB_DIALECT
          value: "sqlite"
        - name: DB_SYNC_ALTER
          value: "true"
        - name: FRONTEND_URL
          value: "http://localhost:30051"
---
apiVersion: v1
kind: Service
metadata:
  name: hospitalx-backend
  labels:
    app: hospitalx-backend
spec:
  type: NodePort
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30050
  selector:
    app: hospitalx-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospitalx-frontend
  labels:
    app: hospitalx-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospitalx-frontend
  template:
    metadata:
      labels:
        app: hospitalx-frontend
    spec:
      containers:
      - name: frontend
        image: hospitalx-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hospitalx-frontend
  labels:
    app: hospitalx-frontend
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30051
  selector:
    app: hospitalx-frontend
